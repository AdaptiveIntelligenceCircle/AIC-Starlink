name: Static Analysis

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang clang-tidy clang-format

      - name: Run formatting check
        run: |
          chmod +x scripts/*.sh
          ./scripts/format.sh check

      - name: Run clang-tidy
        run: |
          chmod +x scripts/*.sh
          ./scripts/lint.sh