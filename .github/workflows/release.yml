name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zip

      - name: Build Release
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh Release clean

      - name: Run tests
        run: |
          ./scripts/run_tests.sh Release

      - name: Package build artifacts
        run: |
          mkdir -p dist
          zip -r dist/AIC-Starlink-${{ github.ref_name }}.zip build/ docs/ examples/ LICENSE README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AIC-Starlink-${{ github.ref_name }}.zip